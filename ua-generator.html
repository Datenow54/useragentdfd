<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UA Generator</title>
</head>
<body style="font-family:Arial;text-align:center;padding:20px;background:#111;color:#fff">

<h2>UA Generator</h2>

<button onclick="gen()">Generate UA</button>

<br><br>

<textarea id="out" style="width:90%;height:150px"></textarea>

<script>
function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min;}

function gen(){
  let chrome = rand(133,146);
  let ua =
  "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 " +
  "(KHTML, like Gecko) Chrome/" + chrome + ".0." + rand(1000,9999) +
  "." + rand(50,200) + " Safari/537.36";

  document.getElementById("out").value = ua;
}
</script>

</body>
</html>
